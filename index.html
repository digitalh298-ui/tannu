<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Tannu</title>
    <style>
        :root { --primary: #ff4d6d; }
        body { margin: 0; padding: 0; background-color: #121212; font-family: sans-serif; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 1s ease; }
        body.light-up { background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c1 100%); color: #4a0e17; }
        .main-container { width: 100%; max-width: 450px; min-height: 75vh; background: #1a1a1a; border-radius: 30px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: all 1s ease; }
        body.light-up .main-container { background: rgba(255, 255, 255, 0.7); }
        .step-panel { display: none; width: 100%; }
        .step-panel.active { display: block; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 30px; cursor: pointer; margin-top: 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .photo-card { background: #fff; border-radius: 12px; overflow: hidden; padding: 5px; }
        .photo-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; }
        .photo-desc { font-size: 0.8rem; font-weight: bold; margin-top: 5px; color: #333; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="step-panel active" id="panel1">
        <h1>The Stage is Set... 🌟</h1>
        <button class="btn" onclick="document.body.classList.add('light-up'); document.getElementById('panel1').classList.remove('active'); document.getElementById('panel2').classList.add('active');">TURN ON LIGHTS 💡</button>
    </div>

    <div class="step-panel" id="panel2">
        <h2 style="color: #d90429;">Happy Birthday, Tannu! 👑</h2>
        <p>Zindagi mein aapka aana mere liye sabse bada tohfa hai. Aapki smile aur parwah meri duniya ko khoobsurat banati hai. Happy Birthday meri jaan! 🥰❤️</p>
        
        <div class="grid-container">
            <div class="photo-card">
                <img src="https://i.ibb.co/Lp29Z4P/1000424997.jpg" alt="Cute Cat">
                <div class="photo-desc">My Cute Cat 🐱</div>
            </div>
            <div class="photo-card">
                <img src="https://i.ibb.co/3kM2Z9z/1000424996.jpg" alt="Chocolate">
                <div class="photo-desc">Almond Treat 🍫</div>
            </div>
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?w=400" alt="Sky">
                <div class="photo-desc">Beautiful Sky ☁️</div>
            </div>
            <div class="photo-card">
                <img src="https://images.unsplash.com/photo-1532693322450-2cb5c511067d?w=400" alt="Moon">
                <div class="photo-desc">Beautiful Moon 🌙</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
